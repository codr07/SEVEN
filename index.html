      body { font-family: 'Inter', sans-serif; font-display: swap; overflow-x: hidden; background-color: #050505; margin: 0; }
      h1, h2, h3, h4, h5, h6, .italic-font { font-family: 'Montserrat', sans-serif; font-display: swap; }
      
      /* Preloader Styles */
      .preloader-container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #050505;
        flex-direction: column;
        gap: 2rem;
      }
      
      .preloader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        width: 100%;
        max-width: 280px;
      }

      .fancy-spinner {
        width: 80px;
        height: 80px;
        position: relative;
      }

      .fancy-spinner .ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid transparent;
      }

      .fancy-spinner .ring:nth-child(1) {
        border-top-color: #8b5cf6; /* Primary */
        animation: spin-ring 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      }

      .fancy-spinner .ring:nth-child(2) {
        border-right-color: #d946ef; /* Accent */
        animation: spin-ring 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
        inset: 8px;
        width: calc(100% - 16px);
        height: calc(100% - 16px);
      }

      .fancy-spinner .ring:nth-child(3) {
        border-bottom-color: #06b6d4; /* Secondary */
        animation: spin-ring 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        inset: 16px;
        width: calc(100% - 32px);
        height: calc(100% - 32px);
      }

      @keyframes spin-ring {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .preloader-text-wrapper {
        display: flex;
        justify-content: space-between;
        width: 100%;
        margin-bottom: -1rem;
      }

      .preloader-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.8);
      }
      
      .preloader-percentage {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 10px;
        color: #d946ef;
      }

      .progress-bar-container {
        width: 100%;
        height: 3px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(to right, #8b5cf6, #d946ef, #06b6d4);
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      }

    <!-- Preloader Animation Script -->
    <script>
      (function() {
        const preloader = document.getElementById('global-preloader');
        const progressFill = document.getElementById('progress-bar-fill');
        const progressText = document.getElementById('progress-text');
        
        let progress = 0;
        const duration = 2500; // 2.5 seconds artificial load time
        const intervalTime = 20;
        const increment = (100 / (duration / intervalTime));

        // Ease-out function for smooth decelaration
        function easeOutCubic(x) {
          return 1 - Math.pow(1 - x, 3);
        }

        let elapsedTime = 0;
        const interval = setInterval(() => {
          elapsedTime += intervalTime;
          let progressPercent = easeOutCubic(elapsedTime / duration) * 100;
          
          if (progressPercent >= 100) {
            progressPercent = 100;
            clearInterval(interval);
            // Wait a tiny bit at 100% before fading out
            setTimeout(() => {
              preloader.style.opacity = '0';
              preloader.style.transition = 'opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
              setTimeout(() => preloader.remove(), 600);
            }, 300);
          }
          
          progressFill.style.width = `${progressPercent}%`;
          progressText.innerText = `${Math.floor(progressPercent)}%`;
        }, intervalTime);
      })();
    </script>
